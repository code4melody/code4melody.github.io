<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate K-Pop Star Quiz</title>
    <style>
        :root {
            --primary: #ff4a8d;
            --primary-hover: #e03273;
            --bg-dark: #121214;
            --card-bg: #1e1e24;
            --text-light: #ffffff;
            --text-muted: #a0a0ab;
            --correct: #4caf50;
            --incorrect: #f44336;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 550px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            padding: 30px;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: #333;
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--primary);
            transition: width 0.3s ease;
        }

        .stats-text {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .image-viewport {
            width: 100%;
            height: 340px;
            border-radius: 12px;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-bottom: 25px;
            border: 2px solid #2a2a32;
        }

        .image-viewport img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: #2a2a32;
            color: var(--text-light);
            border: 2px solid transparent;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .option-btn:hover:not([disabled]) {
            background-color: #353540;
            border-color: var(--primary);
        }

        .option-btn[disabled] {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: var(--correct) !important;
            color: white;
        }

        .option-btn.incorrect {
            background-color: var(--incorrect) !important;
            color: white;
        }

        .next-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: inline-block;
            transition: background 0.2s ease;
            margin-top: 10px;
        }

        .next-btn:hover {
            background-color: var(--primary-hover);
        }

        .hide {
            display: none !important;
        }

        .result-title {
            font-size: 2rem;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .score-display {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .feedback-msg {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-view">
            <h1>Guess the K-Pop Star!</h1>
            <div class="stats-text" id="question-counter">Question 1 of 20</div>
            
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="image-viewport">
                <img id="star-image" src="" alt="K-pop Idol Profile">
            </div>

            <div class="options-grid" id="options-container"></div>

            <button id="next-button" class="next-btn hide">Next Question</button>
        </div>

        <div id="result-view" class="hide">
            <div class="result-title">Quiz Completed! 🎉</div>
            <div class="score-display" id="final-score">0 / 20</div>
            <div class="feedback-msg" id="feedback-message">Not bad, keep listening!</div>
            <button class="next-btn" onclick="restartQuiz()">Play Again</button>
        </div>
    </div>

    <script>

            },

                correct: 2
            },
            {

                options: ["Jin (BTS)", "RM (BTS)", "J-Hope (BTS)", "V (BTS)"],

            },
            {

                options: ["Karina (aespa)", "Winter (aespa)", "Giselle (aespa)", "Sullyoon (NMIXX)"],
                correct: 0
            },
            {

                correct: 1

                correct: 2
            },
            {

                options: ["Lisa (BLACKPINK)", "Minnie ((G)I-DLE)", "Somi", "Moka (ILLIT)"],
                correct: 0
            },
            {

                correct: 1
            },
            {

                options: ["Ningning (aespa)", "Winter (aespa)", "Kazuha (LE SSERAFIM)", "Eunbi"],
                correct: 1
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/5/52/Kim_Chae-won_at_Incheon_Airport_221211.png",
                options: ["Sakura (LE SSERAFIM)", "Kim Chaewon (LE SSERAFIM)", "Yunjin (LE SSERAFIM)", "Rei (IVE)"],
                correct: 1
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/0/07/Hanni_at_Incheon_Airport_230222.png",
                options: ["Hanni (NewJeans)", "Danielle (NewJeans)", "Ahyeon (BABYMONSTER)", "Wonhee (ILLIT)"],
                correct: 0
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/7/77/IU_at_Incheon_Airport_240310.jpg",
                options: ["Taeyeon", "IU", "Suzy", "Nayeon (TWICE)"],
                correct: 1
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/0/0b/Park_Ji-min_at_Incheon_Airport_230513.png",
                options: ["Suga (BTS)", "J-Hope (BTS)", "Jimin (BTS)", "Jin (BTS)"],
                correct: 2
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/c/cb/Kim_Ji-soo_at_Incheon_Airport_230303.png",
                options: ["Jisoo (BLACKPINK)", "Irene (Red Velvet)", "Miyeon ((G)I-DLE)", "Sullyoon (NMIXX)"],
                correct: 0
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/a/a2/Kim_Min-gyu_at_Incheon_Airport_on_February_26%2C_240226.jpg",
                options: ["Hoshi (SEVENTEEN)", "Wonwoo (SEVENTEEN)", "Scoups (SEVENTEEN)", "Mingyu (SEVENTEEN)"],
                correct: 3
            },
            {
                img: "https://upload.wikimedia.org/wikipedia/commons/e/e0/Choi_Yeon-jun_at_Incheon_Airport_230303.png",
                options: ["Soobin (TXT)", "Yeonjun (TXT)", "Beomgyu (TXT)", "Heeseung (ENHYPEN)"],
                correct: 1
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        const quizView = document.getElementById('quiz-view');
        const resultView = document.getElementById('result-view');
        const counterEl = document.getElementById('question-counter');
        const progressBar = document.getElementById('progress-bar');
        const starImage = document.getElementById('star-image');
        const optionsContainer = document.getElementById('options-container');
        const nextButton = document.getElementById('next-button');
        const finalScoreEl = document.getElementById('final-score');
        const feedbackEl = document.getElementById('feedback-message');

        function initQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            resultView.classList.add('hide');
            quizView.classList.remove('hide');
            loadQuestion();
        }

        function loadQuestion() {
            nextButton.classList.add('hide');
            optionsContainer.innerHTML = '';
            
            const currentQuestion = quizData[currentQuestionIndex];
            
            counterEl.innerText = `Question ${currentQuestionIndex + 1} of ${quizData.length}`;
            const progressPercent = ((currentQuestionIndex) / quizData.length) * 100;
            progressBar.style.width = `${progressPercent}%`;

            starImage.src = currentQuestion.img;

            currentQuestion.options.forEach((optionText, index) => {
                const button = document.createElement('button');
                button.classList.add('option-btn');
                button.innerText = optionText;
                button.addEventListener('click', () => selectAnswer(index, button));
                optionsContainer.appendChild(button);
            });
        }

        function selectAnswer(selectedIndex, clickedButton) {
            const currentQuestion = quizData[currentQuestionIndex];
            const allButtons = optionsContainer.querySelectorAll('.option-btn');

            allButtons.forEach(btn => btn.disabled = true);

            if (selectedIndex === currentQuestion.correct) {
                clickedButton.classList.add('correct');
                score++;
            } else {
                clickedButton.classList.add('incorrect');
                allButtons[currentQuestion.correct].classList.add('correct');
            }

            nextButton.classList.remove('hide');
        }

        nextButton.addEventListener('click', () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        });

        function showResults() {
            progressBar.style.width = '100%';
            quizView.classList.add('hide');
            resultView.classList.remove('hide');
            
            finalScoreEl.innerText = `${score} / ${quizData.length}`;
            
            if (score === 20) {
                feedbackEl.innerText = "Absolute Multistan Legend! You know everyone! 👑";
            } else if (score >= 15) {
                feedbackEl.innerText = "Certified K-Pop Expert! Your playlist must be incredible. 🔥";
            } else if (score >= 10) {
                feedbackEl.innerText = "Casual Fan! You know the headliners well. 👍";
            } else {
                feedbackEl.innerText = "Time to stream some more music videos and try again! 🎵";
            }
        }

        function restartQuiz() {
            initQuiz();
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
