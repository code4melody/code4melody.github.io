<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kpop SAT Tutor</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
        }

        /* Character Selection Screen */
        #selection-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tutor-options {
            display: flex;
            gap: 40px;
            margin-top: 30px;
        }

        .tutor-card {
            background: #fff;
            border: 3px solid #dfe6e9;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 180px;
        }

        .tutor-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.2);
        }

        .tutor-card h3 {
            margin: 10px 0 0 0;
        }

        /* Quiz Layout */
        #quiz-screen {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            #quiz-screen {
                grid-template-columns: 1fr;
            }
        }

        /* Tutor Panel Layout */
        .tutor-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .tutor-img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Speech Bubble */
        .speech-bubble {
            position: relative;
            background: var(--primary-color);
            color: white;
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            width: 80%;
            text-align: center;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .speech-bubble:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 0;
            border: 15px solid transparent;
            border-top-color: var(--primary-color);
            border-bottom: 0;
            border-left: 0;
            margin-left: -7.5px;
            margin-bottom: -15px;
        }

        /* Question Panel Layout */
        .question-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .progress-bar {
            background-color: #dfe6e9;
            border-radius: 10px;
            height: 10px;
            width: 100%;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            background-color: var(--primary-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .definition {
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-weight: 600;
            line-height: 1.5;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-option {
            background-color: #fff;
            border: 2px solid #b2bec3;
            border-radius: 10px;
            padding: 15px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-option:hover {
            background-color: #f1f2f6;
            border-color: var(--text-color);
        }

        /* Results Screen */
        #results-screen {
            display: none;
            text-align: center;
        }

        .btn-restart {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .btn-restart:hover {
            background-color: #5b4bc4;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. Selection Screen -->
    <div id="selection-screen">
        <h1>Choose Your Kpop SAT Tutor</h1>
        <div class="tutor-options">
            <div class="tutor-card" onclick="selectTutor('rei')">
                <h3>Rei</h3>
                <p>The Charismatic Star</p>
            </div>
            <div class="tutor-card" onclick="selectTutor('jaeho')">
                <h3>Jaeho</h3>
                <p>The Caring Romantic</p>
            </div>
        </div>
    </div>

    <!-- 2. Quiz Screen -->
    <div id="quiz-screen">
        <div class="tutor-panel">
            <div class="speech-bubble" id="speech-bubble">Let's do our best today! Ready to study?</div>
            <img src="" alt="Tutor" class="tutor-img" id="tutor-img">
        </div>
        
        <div class="question-panel">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div id="question-info" style="margin-bottom: 10px; color: #7f8c8d;">Question 1 of 50</div>
            <div class="definition" id="definition-text">Loading definition...</div>
            <div class="options-grid" id="options-container">
                <!-- Buttons dynamically generated here -->
            </div>
        </div>
    </div>

    <!-- 3. Results Screen -->
    <div id="results-screen">
        <h1>Study Session Complete!</h1>
        <p id="final-score-text"></p>
        <button class="btn-restart" onclick="resetQuiz()">Study Again</button>
    </div>
</div>

<script>
    // Sample pool of SAT words to complete a 50-question cycle smoothly
    const satVocabulary = [
        { definition: "To treat with wastefulness; squander.", correct: "prodigal", choices: ["prodigal", "frugal", "austere", "parsimonious"] },
        { definition: "Extremely harmful; destructive; deadly.", correct: "pernicious", choices: ["pernicious", "salubrious", "innocuous", "benign"] },
        { definition: "An abundance; an excess amount of something.", correct: "plethora", choices: ["plethora", "dearth", "scarcity", "paucity"] },
        { definition: "To clear from blame; prove innocent.", correct: "exonerate", choices: ["exonerate", "incriminate", "culpate", "indict"] },
        { definition: "Unwavering; stubbornly adhering to an opinion or purpose.", correct: "obstinate", choices: ["obstinate", "pliant", "malleable", "tractable"] },
        // ... Adding placeholder objects to dynamically build out 50 items for testing purposes
    ];

    // Auto-generate mock questions up to 50 if list length is under 50
    while(satVocabulary.length < 50) {
        let id = satVocabulary.length + 1;
        satVocabulary.push({
            definition: `[SAT Word Definition #${id}] To change or alter repeatedly.`,
            correct: `Word-${id}-A`,
            choices: [`Word-${id}-A`, `Word-${id}-B`, `Word-${id}-C`, `Word-${id}-D`]
        });
    }

    let currentTutor = '';
    let currentIndex = 0;
    let correctCount = 0;

    // Dialogue matrices customized per personality archetype
    const dialoguePool = {
        rei: {
            default: ["Let's shine bright today!", "Keep your focus on the stage!", "Ready for the next one?"],
            happy: ["Great job! You've got rhythm!", "Way to hit the high note!", "Amazing choice!"],
            happier: ["Unbelievable! You are completely flawless!", "Center stage performance! Perfect!", "Wow, you're a superstar!"],
            sad: ["Don't lose your tempo, try again.", "Ah, miss-stepped a bit there. Stay focused!", "Keep your chin up, let's practice more."],
            sadder: ["We need to completely reset our choreography.", "Hey, look at me. Concentrate!", "Don't give up on me now."]
        },
        jaeho: {
            default: ["Take your time, I'm right here with you.", "Let's study comfortably today.", "You're doing wonderful just trying."],
            happy: ["Wonderful! You're making me so proud.", "You remembered! That's excellent.", "Your hard work is really paying off."],
            happier: ["You are absolutely brilliant! Truly spectacular!", "I am so incredibly happy to see you succeed like this!", "Perfect scores look beautiful on you."],
            sad: ["It's okay to make mistakes. Let's look closely together.", "Don't be discouraged, love. Next time will be better.", "A small hurdle, we can overcome it."],
            sadder: ["Oh no... are you feeling tired? Let's take a deep breath.", "Please don't be sad. I'll help you through this.", "Let's work through this difficult spot together, okay?"]
        }
    };

    function selectTutor(tutor) {
        currentTutor = tutor;
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'grid';
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIndex >= 50) {
            showResults();
            return;
        }

        // Progress bar and info tracking
        document.getElementById('progress-fill').style.width = `${(currentIndex / 50) * 100}%`;
        document.getElementById('question-info').innerText = `Question ${currentIndex + 1} of 50`;

        const q = satVocabulary[currentIndex];
        document.getElementById('definition-text').innerText = q.definition;

        // Dynamic State / Asset Evaluation via Running Math Logic Matrix
        updateTutorState();

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        q.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = choice;
            btn.onclick = () => handleAnswer(choice === q.correct);
            optionsContainer.appendChild(btn);
        });
    }

    function updateTutorState() {
        let imgName = 'default.jpg';
        let mood = 'default';

        if (currentIndex > 0) {
            const percentage = (correctCount / currentIndex) * 100;

            if (percentage >= 95) {
                imgName = 'happier.jpg';
                mood = 'happier';
            } else if (percentage >= 75 && percentage < 90) { // Strict validation boundaries mapped matching query rules
                imgName = 'happy.jpg';
                mood = 'happy';
            } else if (percentage >= 50 && percentage < 75) {
                imgName = 'sad.jpg';
                mood = 'sad';
            } else if (percentage < 50) {
                imgName = 'sadder.jpg';
                mood = 'sadder';
            }
        }

        document.getElementById('tutor-img').src = `images/${currentTutor}/${imgName}`;
        
        // Select random dialogue matching the calculated mood index
        const phrases = dialoguePool[currentTutor][mood];
        const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
        document.getElementById('speech-bubble').innerText = randomPhrase;
    }

    function handleAnswer(isCorrect) {
        if (isCorrect) correctCount++;
        currentIndex++;
        loadQuestion();
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        
        const finalPercentage = ((correctCount / 50) * 100).toFixed(1);
        document.getElementById('final-score-text').innerText = 
            `You correctly identified ${correctCount} out of 50 terms (${finalPercentage}%).`;
    }

    function resetQuiz() {
        currentIndex = 0;
        correctCount = 0;
        document.getElementById('results-screen').style.display = 'none';
        document.getElementById('selection-screen').style.display = 'flex';
    }
</script>

</body>
</html>
