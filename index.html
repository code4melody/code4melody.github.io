<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Pop Idol Guessing Quiz</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --correct: #10b981;
            --wrong: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .score-tracker, .progress-text {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: #334155;
            border-radius: 10px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--accent);
            transition: width 0.3s ease;
        }

        .image-frame {
            width: 100%;
            height: 320px;
            border-radius: 12px;
            overflow: hidden;
            background-color: #334155;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: #334155;
            color: var(--text-main);
            border: 2px solid transparent;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #475569;
            border-color: var(--text-muted);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: rgba(16, 185, 129, 0.2);
            border-color: var(--correct);
            color: #34d399;
            font-weight: 600;
        }

        .option-btn.wrong {
            background-color: rgba(239, 68, 68, 0.2);
            border-color: var(--wrong);
            color: #f87171;
        }

        .next-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            display: none;
        }

        .next-btn:hover {
            background-color: var(--accent-hover);
        }

        .results-screen {
            display: none;
        }

        .results-screen h1 {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .final-score {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            margin: 20px 0;
        }

        .restart-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <!-- Quiz Play Window -->
        <div id="quiz-window">
            <div class="header-info">
                <span class="progress-text" id="progress-text">Question 1/20</span>
                <span class="score-tracker" id="score-tracker">Score: 0</span>
            </div>
            
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="image-frame">
                <img id="idol-image" src="" alt="K-Pop Idol Profile">
            </div>

            <h2>Who is this idol?</h2>

            <div class="options-grid" id="options-container">
                <!-- Javascript maps buttons here -->
            </div>

            <button class="next-btn" id="next-button" onclick="nextQuestion()">Next Question</button>
        </div>

        <!-- End Game Screen -->
        <div id="results-window" class="results-screen">
            <h1>Quiz Complete!</h1>
            <p>You have successfully identified the artists.</p>
            <div class="final-score" id="final-score-text">0 / 20</div>
            <p id="performance-feedback" style="color: var(--text-muted); margin-bottom: 24px;"></p>
            <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
        </div>
    </div>

    <script>

                options: ["Karina (aespa)", "Jang Wonyoung (IVE)", "Minji (NewJeans)", "Sana (TWICE)"],

            },

            },
            {

                options: ["Ningning (aespa)", "Joy (Red Velvet)", "Jennie (BLACKPINK)", "Momo (TWICE)"],

            {

            {

            },
            {

                correct: 3
            },
            {
                img: "https://images.weserv.nl/?url=upload.wikimedia.org/wikipedia/commons/f/f0/Sana_at_the_Prada_Mode_Seoul_event_in_September_2023.jpg",
                options: ["Nayeon (TWICE)", "Sana (TWICE)", "Mina (TWICE)", "Tzuyu (TWICE)"],
                correct: 1
            },
            {

                options: ["Han (Stray Kids)", "Yeonjun (TXT)", "Hyunjin (Stray Kids)", "Sunghoon (ENHYPEN)"],

            {

            },
            {

                options: ["Jaehyun (NCT)", "Cha Eunwoo (ASTRO)", "Rowoon", "Mingyu (SEVENTEEN)"],

            },
            {

                options: ["Ningning (aespa)", "Winter (aespa)", "Kazuha (LE SSERAFIM)", "Eunbi"],
                correct: 1
            },
            {

                options: ["Sakura (LE SSERAFIM)", "Kim Chaewon (LE SSERAFIM)", "Yunjin (LE SSERAFIM)", "Rei (IVE)"],
                correct: 1
            },
            {
                img: "https://images.weserv.nl/?url=upload.wikimedia.org/wikipedia/commons/3/33/Hanni_at_Gucci_Cruise_2024.jpg",
                options: ["Hanni (NewJeans)", "Danielle (NewJeans)", "Ahyeon (BABYMONSTER)", "Wonhee (ILLIT)"],
                correct: 0
            },
            {
                img: "https://images.weserv.nl/?url=upload.wikimedia.org/wikipedia/commons/c/c5/IU_at_the_2022_Golden_Disc_Awards.jpg",
                options: ["Taeyeon", "IU", "Suzy", "Nayeon (TWICE)"],
                correct: 1
            },
            {
                img: "https://images.weserv.nl/?url=upload.wikimedia.org/wikipedia/commons/7/77/Park_Ji-min_for_Dior_in_2023.jpg",
                options: ["Suga (BTS)", "J-Hope (BTS)", "Jimin (BTS)", "Jin (BTS)"],
                correct: 2
            },
            {
                img: "https://images.weserv.nl/?url=upload.wikimedia.org/wikipedia/commons/9/91/Kim_Ji-soo_for_Dior_in_2023.jpg",
                options: ["Jisoo (BLACKPINK)", "Irene (Red Velvet)", "Miyeon ((G)I-DLE)", "Sullyoon (NMIXX)"],
                correct: 0
            },
            {
                img: "https://images.weserv.nl/?url=upload.wikimedia.org/wikipedia/commons/e/eb/Kim_Min-gyu_for_Marie_Claire_Korea_in_2023.jpg",
                options: ["Hoshi (SEVENTEEN)", "Wonwoo (SEVENTEEN)", "Scoups (SEVENTEEN)", "Mingyu (SEVENTEEN)"],
                correct: 3
            },
            {
                img: "https://images.weserv.nl/?url=upload.wikimedia.org/wikipedia/commons/4/4e/Choi_Yeon-jun_for_Marie_Claire_Korea_in_2023.jpg",
                options: ["Soobin (TXT)", "Yeonjun (TXT)", "Beomgyu (TXT)", "Heeseung (ENHYPEN)"],
                correct: 1
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        function loadQuestion() {
            const currentQuestion = quizData[currentQuestionIndex];
            
            // Update Text Data
            document.getElementById("progress-text").innerText = `Question ${currentQuestionIndex + 1}/${quizData.length}`;
            document.getElementById("score-tracker").innerText = `Score: ${score}`;
            
            // Update Progress Bar Graphic
            const progressPercent = ((currentQuestionIndex) / quizData.length) * 100;
            document.getElementById("progress-bar").style.width = `${progressPercent}%`;

            // Inject Image
            document.getElementById("idol-image").src = currentQuestion.img;
            
            // Rebuild Option Buttons
            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = "";
            
            currentQuestion.options.forEach((option, index) => {
                const button = document.createElement("button");
                button.className = "option-btn";
                button.innerText = option;
                button.onclick = () => selectOption(index);
                optionsContainer.appendChild(button);
            });

            // Hide Next Button initially
            document.getElementById("next-button").style.display = "none";
        }

        function selectOption(selectedIndex) {
            const currentQuestion = quizData[currentQuestionIndex];
            const buttons = document.querySelectorAll(".option-btn");
            
            // Freeze input
            buttons.forEach(btn => btn.disabled = true);

            if (selectedIndex === currentQuestion.correct) {
                buttons[selectedIndex].classList.add("correct");
                score++;
                document.getElementById("score-tracker").innerText = `Score: ${score}`;
            } else {
                buttons[selectedIndex].classList.add("wrong");
                buttons[currentQuestion.correct].classList.add("correct");
            }

            // Expose Next button
            document.getElementById("next-button").style.display = "block";
        }

        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById("quiz-window").style.display = "none";
            document.getElementById("results-window").style.display = "block";
            document.getElementById("final-score-text").innerText = `${score} / ${quizData.length}`;
            
            let feedback = "";
            if (score === quizData.length) feedback = "Ultimate Multi-stan Status achieved! 🌟 Perfect Score!";
            else if (score >= 15) feedback = "Amazing job! You know your groups inside out! 🙌";
            else if (score >= 10) feedback = "Not bad! You've got a solid footprint in the fandom.";
            else feedback = "Time to stream some more music videos and try again! 🎵";
            
            document.getElementById("performance-feedback").innerText = feedback;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById("results-window").style.display = "none";
            document.getElementById("quiz-window").style.display = "block";
            loadQuestion();
        }

        // Run app on initial window load
        window.onload = loadQuestion;
    </script>
</body>
</html>
