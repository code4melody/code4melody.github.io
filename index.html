<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kpop SAT Tutor</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-top: 0;
        }

        /* Character Selection Screen */
        #selection-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tutor-options {
            display: flex;
            gap: 40px;
            margin-top: 30px;
        }

        .tutor-card {
            background: #fff;
            border: 3px solid #dfe6e9;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 180px;
        }

        .tutor-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.2);
        }

        .tutor-card h3 {
            margin: 10px 0 0 0;
        }

        /* Quiz Layout */
        #quiz-screen {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* Tutor Panel Layout */
        .tutor-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .tutor-img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Speech Bubble */
        .speech-bubble {
            position: relative;
            background: var(--primary-color);
            color: white;
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            width: 80%;
            text-align: center;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .speech-bubble:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 0;
            border: 15px solid transparent;
            border-top-color: var(--primary-color);
            border-bottom: 0;
            border-left: 0;
            margin-left: -7.5px;
            margin-bottom: -15px;
        }

        /* Question Panel Layout */
        .question-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .progress-bar {
            background-color: #dfe6e9;
            border-radius: 10px;
            height: 10px;
            width: 100%;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-fill {
            background-color: var(--primary-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Score Tracker Row */
        .score-tracker-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .current-accuracy {
            color: var(--primary-color);
            background-color: #eee9ff;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .audio-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-speaker {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            transition: transform 0.2s;
        }

        .btn-speaker:hover {
            transform: scale(1.1);
        }

        .definition {
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-weight: 600;
            line-height: 1.5;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-option {
            background-color: #fff;
            border: 2px solid #b2bec3;
            border-radius: 10px;
            padding: 15px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-option:hover {
            background-color: #f1f2f6;
            border-color: var(--text-color);
        }

        /* Results Screen */
        #results-screen {
            display: none;
            text-align: center;
        }

        .btn-restart {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .btn-restart:hover {
            background-color: #5b4bc4;
        }

        /* Responsive Mobile Design Media Queries */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 15px;
                border-radius: 12px;
            }

            #quiz-screen {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .tutor-img {
                width: 160px;
                height: 160px;
            }

            .speech-bubble {
                width: 90%;
                font-size: 0.95rem;
                padding: 10px 15px;
                margin-bottom: 15px;
            }

            .definition {
                font-size: 1.05rem;
                margin-bottom: 15px;
            }

            .btn-option {
                padding: 12px;
                font-size: 0.95rem;
            }

            .tutor-options {
                flex-direction: column;
                gap: 15px;
                width: 100%;
            }

            .tutor-card {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="selection-screen">
        <h1>Choose Your Kpop SAT Tutor</h1>
        <div class="tutor-options">
            <div class="tutor-card" onclick="selectTutor('rei')">
                <h3>Rei</h3>
                <p>The Charismatic Star</p>
            </div>
            <div class="tutor-card" onclick="selectTutor('jaeho')">
                <h3>Jaeho</h3>
                <p>The Caring Romantic</p>
            </div>
        </div>
    </div>

    <div id="quiz-screen">
        <div class="tutor-panel">
            <div class="speech-bubble" id="speech-bubble">Let's do our best today! Ready to study?</div>
            <img src="" alt="Tutor" class="tutor-img" id="tutor-img">
        </div>
        
        <div class="question-panel">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            
            <div class="score-tracker-row">
                <div class="audio-controls">
                    <div id="question-info" style="color: #7f8c8d;">Question 1 of 50</div>
                    <button class="btn-speaker" onclick="repeatAudio()" title="Repeat question aloud">🔊</button>
                </div>
                <div class="current-accuracy" id="accuracy-display">Current Accuracy: --</div>
            </div>

            <div class="definition" id="definition-text">Loading definition...</div>
            <div class="options-grid" id="options-container"></div>
        </div>
    </div>

    <div id="results-screen">
        <h1>Study Session Complete!</h1>
        <p id="final-score-text"></p>
        <button class="btn-restart" onclick="resetQuiz()">Study Again</button>
    </div>
</div>

<script>
    const satVocabulary = [
        { definition: "To treat with wastefulness; squander or spend recklessly.", correct: "prodigal", choices: ["prodigal", "frugal", "austere", "parsimonious"] },
        { definition: "Extremely harmful; highly destructive, insidious, or deadly.", correct: "pernicious", choices: ["pernicious", "salubrious", "innocuous", "benign"] },
        { definition: "An excessive abundance; an overproduction or surplus of something.", correct: "plethora", choices: ["plethora", "dearth", "scarcity", "paucity"] },
        { definition: "To completely clear from blame; prove innocent of a wrongdoing.", correct: "exonerate", choices: ["exonerate", "incriminate", "culpate", "indict"] },
        { definition: "Unwavering; stubbornly adhering to an opinion, purpose, or course.", correct: "obstinate", choices: ["obstinate", "pliant", "malleable", "tractable"] },
        { definition: "Hardworking, diligent, and showing great care and effort.", correct: "sedulous", choices: ["sedulous", "indolent", "lethargic", "slothful"] },
        { definition: "To mitigate, lessen, or ease the severity of pain or distress.", correct: "assuage", choices: ["assuage", "aggravate", "exacerbate", "provoke"] },
        { definition: "Doubtful, uncertain, or object of suspicion; hesitating.", correct: "dubious", choices: ["dubious", "indubitable", "unequivocal", "certain"] },
        { definition: "Short-lived; fleeting; lasting for a very brief period.", correct: "ephemeral", choices: ["ephemeral", "perpetual", "enduring", "perennial"] },
        { definition: "Arrogant, overbearing, and supercilious; looking down on others.", correct: "haughty", choices: ["haughty", "humble", "deferential", "modest"] },
        { definition: "Lacking clarity; bright, clear, or easily understood.", correct: "lucid", choices: ["lucid", "obscure", "opaque", "vague"] },
        { definition: "A tiny, scarce, or inadequate amount of something.", correct: "paucity", choices: ["paucity", "profusion", "surplus", "glut"] },
        { definition: "Very talkative; fond of long, rambling chatter.", correct: "garrulous", choices: ["garrulous", "laconic", "reticent", "taciturn"] },
        { definition: "To praise highly; laud, eulogize, or acclaim.", correct: "extol", choices: ["extol", "denigrate", "disparage", "condemn"] },
        { definition: "Devoid of intelligence, depth, or matter; empty and shallow.", correct: "vacuous", choices: ["vacuous", "profound", "astute", "insightful"] },
        { definition: "Characterized by severe self-discipline and abstention from luxury.", correct: "austere", choices: ["austere", "indulgent", "sybaritic", "ostentatious"] },
        { definition: "Quick to recover from misfortune; elastic or adaptable.", correct: "resilient", choices: ["resilient", "fragile", "brittle", "vulnerable"] },
        { definition: "A state of temporary disuse, suspension, or inactivity.", correct: "abeyance", choices: ["abeyance", "continuation", "resurgence", "activity"] },
        { definition: "An absolute preference or strong liking for something.", correct: "predilection", choices: ["predilection", "aversion", "antipathy", "loathing"] },
        { definition: "Bold, daring, and reckless; unconstrained by convention.", correct: "audacious", choices: ["audacious", "timid", "circumspect", "meek"] },
        { definition: "To support or validate with structural proof or evidence.", correct: "corroborate", choices: ["corroborate", "refute", "contradict", "gainsay"] },
        { definition: "A harsh, discordant, and unpleasant mixture of sounds.", correct: "cacophony", choices: ["cacophony", "euphony", "harmony", "melody"] },
        { definition: "An unpredictable, sudden, or eccentric change of mind or behavior.", correct: "capricious", choices: ["capricious", "steadfast", "resolute", "immutable"] },
        { definition: "To trick, deceive, or cheat through clever misrepresentation.", correct: "chicanery", choices: ["chicanery", "candor", "veracity", "honesty"] },
        { definition: "In office; currently holding a specified position or post.", correct: "incumbent", choices: ["incumbent", "applicant", "predecessor", "successor"] },
        { definition: "Secret, stealthy, or surreptitious; trying to avoid notice.", correct: "furtive", choices: ["furtive", "overt", "conspicuous", "blatant"] },
        { definition: "Habitual, deeply ingrained, and unlikely to change.", correct: "inveterate", choices: ["inveterate", "transient", "ephemeral", "incipient"] },
        { definition: "Easily angered; bad-tempered, irritable, or petulant.", correct: "irascible", choices: ["irascible", "placid", "affable", "genial"] },
        { definition: "Using very few words; concise to the point of seeming rude.", correct: "laconic", choices: ["laconic", "verbose", "loquacious", "garrulous"] },
        { definition: "Generous, noble, and forgiving toward a rival or less powerful person.", correct: "magnanimous", choices: ["magnanimous", "vindictive", "malevolent", "petty"] },
        { definition: "Trite, overused, and lacking originality; commonplace.", correct: "banal", choices: ["banal", "novel", "innovative", "profound"] },
        { definition: "A sentimental longing or wistful affection for the past.", correct: "nostalgia", choices: ["nostalgia", "foresight", "anticipation", "apathy"] },
        { definition: "Dull, unimaginative, and commonplace; lacking poetic beauty.", correct: "prosaic", choices: ["prosaic", "sublime", "transcendent", "inspired"] },
        { definition: "Stubbornly disobedient; resisting authority or control.", correct: "recalcitrant", choices: ["recalcitrant", "compliant", "submissive", "amenable"] },
        { definition: "Sparing or minimal in the choice of food or drink; temperate.", correct: "abstemious", choices: ["abstemious", "gluttonous", "voracious", "epicurean"] },
        { definition: "An item or detail that is custom, made-to-order, or commissioned.", correct: "bespoke", choices: ["bespoke", "generic", "standardized", "mass-produced"] },
        { definition: "Widespread, universal, or found everywhere simultaneously.", correct: "ubiquitous", choices: ["ubiquitous", "scarce", "localized", "rare"] },
        { definition: "To change or swing back and forth indecisively between opinions.", correct: "vacillate", choices: ["vacillate", "resolve", "adhere", "conclude"] },
        { definition: "Extremely intensely enthusiastic, passionate, or fervent.", correct: "zealous", choices: ["zealous", "apathetic", "indifferent", "lackadaisical"] },
        { definition: "To renounce, disavow, or formally reject a formerly held belief.", correct: "abjure", choices: ["abjure", "espouse", "embrace", "assert"] },
        { definition: "Obscure, profound, and difficult for an ordinary mind to understand.", correct: "recondite", choices: ["recondite", "manifest", "patent", "obvious"] },
        { definition: "The dynamic collection of structural attributes or components.", correct: "matrix", choices: ["matrix", "void", "periphery", "isolation"] },
        { definition: "Harmonious accord; a state of mutual agreement.", correct: "concord", choices: ["concord", "discord", "strife", "friction"] },
        { definition: "To flash or sparkle brilliantly; to be witty or animated.", correct: "scintillate", choices: ["scintillate", "extinguish", "stagnate", "fade"] },
        { definition: "A completely perfect, flawless embodiment or example of a quality.", correct: "epitome", choices: ["epitome", "anomaly", "deviation", "antithesis"] },
        { definition: "An item or idea belonging to a period other than its correct timeline.", correct: "anachronism", choices: ["anachronism", "synchrony", "archetype", "prototype"] },
        { definition: "To wander away from the primary path or central topic.", correct: "digress", choices: ["digress", "persist", "converge", "direct"] },
        { definition: "To demand or specify a requirement as part of an agreement.", correct: "stipulate", choices: ["stipulate", "imply", "invalidate", "revoke"] },
        { definition: "Stupid, foolish, or completely mindless and pointless.", correct: "fatuous", choices: ["fatuous", "sagacious", "prudent", "shrewd"] },
        { definition: "Existing from birth; inborn, natural, or inherent.", correct: "innate", choices: ["innate", "acquired", "learned", "incidental"] }
    ];

    let currentTutor = '';
    let currentIndex = 0;
    let correctCount = 0;
    let audioCtx = null;

    const dialoguePool = {
        rei: {
            default: ["Let's shine bright today!", "Keep your focus on the stage!", "Ready for the next one?"],
            happy: ["Great job! You've got rhythm!", "Way to hit the high note!", "Amazing choice!"],
            happier: ["Unbelievable! You are completely flawless!", "Center stage performance! Perfect!", "Wow, you're a superstar!"],
            sad: ["Don't lose your tempo, try again.", "Ah, miss-stepped a bit there. Stay focused!", "Keep your chin up, let's practice more."],
            sadder: ["We need to completely reset our choreography.", "Hey, look at me. Concentrate!", "Don't give up on me now."]
        },
        jaeho: {
            default: ["Take your time, I'm right here with you.", "Let's study comfortably today.", "You're doing wonderful just trying."],
            happy: ["Wonderful! You're making me so proud.", "You remembered! That's excellent.", "Your hard work is really paying off."],
            happier: ["You are absolutely brilliant! Truly spectacular!", "I am so incredibly happy to see you succeed like this!", "Perfect scores look beautiful on you."],
            sad: ["It's okay to make mistakes. Let's look closely together.", "Don't be discouraged, love. Next time will be better.", "A small hurdle, we can overcome it."],
            sadder: ["Oh no... are you feeling tired? Let's take a deep breath.", "Please don't be sad. I'll help you through this.", "Let's work through this difficult spot together, okay?"]
        }
    };

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSoundEffect(isCorrect) {
        initAudio();
        const now = audioCtx.currentTime;

        if (isCorrect) {
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, now + (index * 0.06));
                gain.gain.setValueAtTime(0.15, now + (index * 0.06));
                gain.gain.exponentialRampToValueAtTime(0.0001, now + (index * 0.06) + 0.3);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + (index * 0.06));
                osc.stop(now + (index * 0.06) + 0.3);
            });
        } else {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(180, now);
            osc.frequency.linearRampToValueAtTime(110, now + 0.35);
            gain.gain.setValueAtTime(0.25, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.35);
        }
    }

    function selectTutor(tutor) {
        initAudio();
        currentTutor = tutor;
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'grid';
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIndex >= 50) {
            showResults();
            return;
        }

        document.getElementById('progress-fill').style.width = `${(currentIndex / 50) * 100}%`;
        document.getElementById('question-info').innerText = `Question ${currentIndex + 1} of 50`;

        // Update real-time accuracy percentages layout
        updateAccuracyDisplay();

        const q = satVocabulary[currentIndex];
        document.getElementById('definition-text').innerText = q.definition;

        updateTutorState();

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        q.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = choice;
            btn.onclick = () => handleAnswer(choice === q.correct);
            optionsContainer.appendChild(btn);
        });

        speakText(q.definition, q.choices);
    }

    function updateAccuracyDisplay() {
        const display = document.getElementById('accuracy-display');
        if (currentIndex === 0) {
            display.innerText = "Accuracy: 100%";
        } else {
            const runningPercentage = ((correctCount / currentIndex) * 100).toFixed(0);
            display.innerText = `Score: ${correctCount}/${currentIndex} (${runningPercentage}%)`;
        }
    }

    function speakText(definition, choices) {
        window.speechSynthesis.cancel();
        let fullTextToSpeak = `The definition is: ${definition}. Now, choose the right word: ${choices.join(', ')}.`;
        
        let utterance = new SpeechSynthesisUtterance(fullTextToSpeak);
        let voices = window.speechSynthesis.getVoices();
        
        let kpopVoice = 
            voices.find(v => v.lang.toLowerCase() === 'en-kr') ||
            voices.find(v => v.name.toLowerCase().includes('google male') && v.lang.startsWith('en')) ||
            voices.find(v => v.lang.startsWith('en'));
                      
        if (kpopVoice) utterance.voice = kpopVoice;
        
        utterance.rate = 1.05;  
        utterance.pitch = 1.15; 
        
        window.speechSynthesis.speak(utterance);
    }

    function repeatAudio() {
        const q = satVocabulary[currentIndex];
        if (q) speakText(q.definition, q.choices);
    }

    function updateTutorState() {
        let imgName = 'default.jpg';
        let mood = 'default';

        if (currentIndex > 0) {
            const percentage = (correctCount / currentIndex) * 100;

            if (percentage >= 95) {
                imgName = 'happier.jpg';
                mood = 'happier';
            } else if (percentage >= 75 && percentage < 90) {
                imgName = 'happy.jpg';
                mood = 'happy';
            } else if (percentage >= 50 && percentage < 75) {
                imgName = 'sad.jpg';
                mood = 'sad';
            } else if (percentage < 50) {
                imgName = 'sadder.jpg';
                mood = 'sadder';
            }
        }

        document.getElementById('tutor-img').src = `images/${currentTutor}/${imgName}`;
        
        const phrases = dialoguePool[currentTutor][mood];
        const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
        document.getElementById('speech-bubble').innerText = randomPhrase;
    }

    function handleAnswer(isCorrect) {
        window.speechSynthesis.cancel(); 
        playSoundEffect(isCorrect);
        
        if (isCorrect) correctCount++;
        currentIndex++;
        
        setTimeout(loadQuestion, 400);
    }

    function showResults() {
        window.speechSynthesis.cancel();
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('results-screen').style.display = 'block';
        
        const finalPercentage = ((correctCount / 50) * 100).toFixed(1);
        document.getElementById('final-score-text').innerText = 
            `You correctly identified ${correctCount} out of 50 terms (${finalPercentage}%).`;
    }

    function resetQuiz() {
        currentIndex = 0;
        correctCount = 0;
        document.getElementById('results-screen').style.display = 'none';
        document.getElementById('selection-screen').style.display = 'flex';
    }

    if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    }
</script>

</body>
</html>
