<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>
	<link rel="stylesheet" href="css/styles.css">
	<script src="js/master1.js"></script>
</head>
<body>
<div id="gameArea">
	<div id="gameBoard">
<script>
var counter = 0;
var builder = "<table>";
for (var i = 0; i < 3; i++) {
	builder += "<tr>";
	for (var j = 0; j < 3; j++) {
		if (counter % 2 == 0) {
			builder += "<td onclick='changeSquare(\"square" + counter + "\")' class='even' id='square" + counter + "'></td>";
		}

		else {
			builder += "<td onclick='changeSquare(\"square" + counter + "\")' class='odd' id='square" + counter + "'></td>";
		}
		counter++;
	}

	builder += "</tr>";
}

builder += "</table>";
document.writeln(builder);
</script>
	</div>
	<div id="playerInfo">
		Player 1&nbsp;&nbsp;
		<input type="text" id="player1Name" placeholder="Please enter your name" size="25" />
		<br>
		<br>
		<select id="player1Image" onchange="enterPlayer('player1')">
			<option value="#">-- Select your avatar --</option>
			<option value="venusaur">Venosuar</option>
			<option value="charizard">Charizard</option>
			<option value="blastoise">Blastoise</option>
		</select>
		<div id="player1Info"></div>
		<hr>
		Player 2&nbsp;&nbsp;
		<input type="text" id="player2Name" placeholder="Please enter your name" size="25" />
		<br>
		<br>
		<select id="player2Image" onchange="enterPlayer('player2')">
			<option value="#">-- Select your avatar --</option>
			<option value="articuno">Articuno</option>
			<option value="zapdos">Zapdos</option>
			<option value="moltres">Moltres</option>
		</select>
		<div id="player2Info"></div>
	</div>
</div>


<div>
<button onclick="checkSquare()">Check Square</button>
</div>
</body>
</html>
